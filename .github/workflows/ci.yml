name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  TERRAFORM_VERSION: "1.7.5"

jobs:
  api:
    name: API (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile
        run: |
          find app -name '*.py' -print0 | xargs -0 python -m py_compile

      - name: Import smoke
        run: |
          python -c "from app.main import app; print('OK', len(app.routes), 'routes')"

  svc-echo:
    name: svc_echo (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: svc_echo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: svc_echo/requirements.txt

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile
        run: |
          find app -name '*.py' -print0 | xargs -0 python -m py_compile

      - name: Import smoke
        run: |
          python -c "from app.main import app; print('OK', len(app.routes), 'routes')"

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

  terraform:
    name: Terraform fmt / init / validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: fmt
        working-directory: terraform
        run: terraform fmt -check -diff -recursive

      - name: init
        working-directory: terraform
        run: terraform init -backend=false

      - name: validate
        working-directory: terraform
        run: terraform validate -no-color

  compose-validate:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose -f docker-compose.yml config -q
